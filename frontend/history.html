<!DOCTYPE html>
<html>
<head>
    <title>Game History</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #111;
            color: white;
        }

        h1 {
            margin-top: 20px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #222;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 8px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: red;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        a {
            display: block;
            margin-top: 20px;
            color: lightblue;
        }
    </style>
</head>

<body>

<h1>Game History</h1>

<ul id="list"></ul>

<button onclick="clearHistory()">Clear History</button>

<a href="index.html">⬅ Back to Game</a>

<script>
const list = document.getElementById("list");

// LOAD HISTORY
let history = JSON.parse(localStorage.getItem("history")) || [];

if(history.length === 0){
    list.innerHTML = "<p>No games played yet</p>";
} else {
    history.reverse().forEach(game => {
        let li = document.createElement("li");
        li.textContent = `Winner: ${game.winner} | ${game.time}`;
        list.appendChild(li);
    });
}

// CLEAR HISTORY
function clearHistory(){
    localStorage.removeItem("history");
    location.reload();
}
</script>

</body>
</html>
